name: "Discover Nix Configurations"
description: "Dynamically discover nixos, darwin, and home-manager configurations from a flake"
inputs:
  flake:
    description: "Path to the flake (default: current directory)"
    required: false
    default: "."
outputs:
  matrix:
    description: "JSON matrix for GitHub Actions strategy"
    value: ${{ steps.discover.outputs.matrix }}
  count:
    description: "Total number of configurations discovered"
    value: ${{ steps.discover.outputs.count }}
runs:
  using: "composite"
  steps:
    - name: Discover configurations
      id: discover
      shell: bash
      env:
        FLAKE_INPUT: ${{ inputs.flake }}
      run: |
        set -euo pipefail

        # Resolve flake path to absolute (getFlake requires a real path)
        FLAKE_PATH="$(cd "$FLAKE_INPUT" && pwd)"

        # Single nix eval: discover.nix returns the full matrix in one pass.
        # Each entry: { name, type, system, runner, attr }
        echo "::group::Evaluating flake configurations"
        matrix=$(nix eval --json --impure \
          --expr "import $GITHUB_ACTION_PATH/discover.nix { flakePath = \"$FLAKE_PATH\"; }")
        echo "::endgroup::"

        # Pretty-print summary using preinstalled jq (no nixpkgs#jq fetch)
        count=$(echo "$matrix" | jq 'length')
        echo "::group::Discovery summary"
        echo "Total configurations: $count"
        echo "$matrix" | jq .
        echo "::endgroup::"

        # Emit outputs (compact JSON for matrix; raw int for count)
        echo "matrix={\"include\":$(echo "$matrix" | jq -c .)}" >> "$GITHUB_OUTPUT"
        echo "count=$count" >> "$GITHUB_OUTPUT"
