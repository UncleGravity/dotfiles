# -----------------------------------------------------------------------------
# Workflow: ci.yml
#
# Purpose
#   • Validates Nix flake configuration across multiple platforms
#   • Dynamically discovers and builds all nixos, darwin, and home-manager configs
#   • Saves build outputs to Cachix to avoid rebuilding on Nix hosts
#   • Sends notifications on CI failures via ntfy
#
# Triggered on pull requests to ensure changes work across all supported systems.
# -----------------------------------------------------------------------------
name: "CI"
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Flake check (fast validation)
  # ---------------------------------------------------------------------------
  flake-check:
    runs-on: ubuntu-latest
    name: "Flake Check"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run nix flake check
        run: nix flake check --all-systems --show-trace

  # ---------------------------------------------------------------------------
  # Job 2: Discover all configurations dynamically
  # ---------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    name: "Discover Configurations"
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/discover-nix-configs
        id: discover

  # ---------------------------------------------------------------------------
  # Job 3: Build each configuration on appropriate runner
  # ---------------------------------------------------------------------------
  build:
    needs: [flake-check, discover]
    if: ${{ needs.discover.outputs.count > 0 }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    name: "Build ${{ matrix.type }}/${{ matrix.name }}"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-up-space
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v15
        with:
          name: ${{ secrets.CACHIX_CACHE }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build ${{ matrix.type }}/${{ matrix.name }}
        run: |
          echo "Building ${{ matrix.attr }} on ${{ matrix.system }}"
          nix build ${{ matrix.attr }} --show-trace
      - name: Push to Cachix
        run: |
          if [ -L result ]; then
            cachix push ${{ secrets.CACHIX_CACHE }} ./result
          fi

  # ---------------------------------------------------------------------------
  # Job 4: Notify on failures
  # ---------------------------------------------------------------------------
  notify:
    needs: [flake-check, discover, build]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    name: "Notify CI Failures"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ntfy
        with:
          topic: ${{ secrets.NTFY_TOPIC }}
          title: "[Github] CI Workflow Fail"
          priority: "5"
          tags: "x"
          message: |
            CI build job failed
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
